name: Daily Security Feed Scraper

# ──────────────────────────────────────────────────────────────────
# Runs automatically at 05:00 Pacific Time (13:00 UTC in winter,
# 12:00 UTC in summer). GitHub Actions uses UTC, so we use 13:00 UTC
# as a safe year-round approximation. Adjust seasonally if needed.
#
# Also runs on:
#   - Manual trigger from GitHub UI (Actions → Run workflow)
#   - workflow_dispatch from the browser Refresh button
#     (the browser calls the GitHub API with a Fine-Grained PAT
#      stored in GH_DISPATCH_TOKEN secret — it never touches the code)
#
# SECRETS REQUIRED (set in Settings → Secrets → Actions):
#   ANTHROPIC_API_KEY   — your Anthropic key, used server-side only
#   GH_DISPATCH_TOKEN   — (optional) Fine-Grained PAT for browser dispatch
#                          Scopes needed: Actions: Read & Write (on this repo)
# ──────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 13 * * *'   # 05:00 PT (winter/PST). Change to '0 12 * * *' in PDT season.

  workflow_dispatch:
    inputs:
      custom_prompt:
        description: 'Optional custom analysis prompt (overrides default 48h report)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python setup ──────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install dependencies ───────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run scraper (passes secrets as env vars) ───────────────
      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CUSTOM_PROMPT:     ${{ github.event.inputs.custom_prompt }}
          # AI_ENABLED: read from a GitHub Actions Variable (not a Secret).
          # Go to: Settings → Secrets and variables → Actions → Variables tab
          # Add variable: AI_ENABLED = false   (or true to re-enable)
          # Leave it unset to fall back to the code-level flag in scraper.py.
          AI_ENABLED: ${{ vars.AI_ENABLED }}
        run: python scraper.py

      # ── 5. Inject GH_DISPATCH_TOKEN into config.js ───────────────
      # This allows the browser Refresh / Custom Prompt buttons to trigger
      # workflow_dispatch. The PAT has minimal permissions (Actions write only).
      # It is NOT a secret in the true sense — it's a limited-scope token —
      # but it should still only be readable by authenticated users of your site.
      # For a personal/private portfolio, this is an acceptable pattern.
      # Alternatives: use a Cloudflare Worker or Netlify Function as a proxy.
      - name: Inject dispatch token into config.js
        env:
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
        run: |
          cat > config.js << 'EOF'
          // Auto-generated by GitHub Actions — do not edit manually.
          // Contains a limited-scope PAT for triggering workflow_dispatch.
          window.GH_DISPATCH_TOKEN = 'PLACEHOLDER';
          EOF
          # Replace placeholder with actual token
          sed -i "s/PLACEHOLDER/${GH_DISPATCH_TOKEN}/" config.js

      # ── 6. Commit and push all generated files ────────────────────
      - name: Commit and push results
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            feed_history.json \
            report.json \
            meta.json \
            terms.txt \
            config.js \
            results_*.csv

          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "chore: automated security feed update [$(date -u '+%Y-%m-%d %H:%M UTC')]"

            # Pull with rebase and auto-resolve conflicts favouring Actions output
            if ! git pull --rebase origin main; then
              echo "Rebase conflict — resolving by keeping Actions output"
              for f in feed_history.json report.json meta.json terms.txt config.js; do
                git checkout --theirs "$f" 2>/dev/null && git add "$f" || true
              done
              git rebase --continue || (git rebase --abort && exit 1)
            fi

            git push
          else
            echo "No changes to commit."
          fi
