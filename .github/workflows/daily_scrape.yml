name: Daily Security Feed Scraper

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      custom_prompt:
        description: 'Optional custom analysis prompt'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CUSTOM_PROMPT: ${{ github.event.inputs.custom_prompt }}
          AI_ENABLED: ${{ vars.AI_ENABLED }}
        run: python scraper.py

      - name: Write config.js via Contents API
        env:
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
        run: |
          printf 'window.GH_DISPATCH_TOKEN="%s";\n' "$GH_DISPATCH_TOKEN" > config.js

          # Get current SHA of config.js if it exists
          curl -s \
            -H "Authorization: Bearer ${GH_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/TinkerWithAll/Web/contents/config.js?ref=main" \
            > /tmp/config_meta.json

          python3 << 'PYEOF'
          import json, subprocess, sys

          with open('/tmp/config_meta.json') as f:
              meta = json.load(f)
          sha = meta.get('sha', '')

          with open('config.js', 'rb') as f:
              import base64
              content = base64.b64encode(f.read()).decode()

          body = {'message': 'chore: update config.js [skip ci]', 'content': content}
          if sha:
              body['sha'] = sha

          import urllib.request, json as jsonmod
          data = jsonmod.dumps(body).encode()

          import os
          token = os.environ['GH_DISPATCH_TOKEN']
          req = urllib.request.Request(
              'https://api.github.com/repos/TinkerWithAll/Web/contents/config.js',
              data=data,
              method='PUT',
              headers={
                  'Authorization': f'Bearer {token}',
                  'Accept': 'application/vnd.github+json',
                  'Content-Type': 'application/json',
              }
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
                  commit_sha = result.get('commit', {}).get('sha', '')
                  print(f'config.js written OK: {commit_sha[:12]}')
          except Exception as e:
              print(f'WARNING: config.js write failed: {e}', file=sys.stderr)
          PYEOF

      - name: Commit and push data files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Never commit config.js — it was written via API above
          git reset HEAD config.js 2>/dev/null || true
          git checkout -- config.js 2>/dev/null || true

          git add -A

          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          git commit -m "chore: automated feed update [$(date -u '+%Y-%m-%d %H:%M UTC')]"

          # Retry loop — rebase up to 3 times to absorb the config.js API commit
          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}..."
            git pull --rebase origin main
            if git push origin main; then
              echo "Push succeeded."
              exit 0
            fi
            sleep 5
          done

          echo "Push failed after 3 attempts."
          exit 1
