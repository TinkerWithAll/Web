name: Daily Security Feed Scraper

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      custom_prompt:
        description: 'Optional custom analysis prompt'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CUSTOM_PROMPT:     ${{ github.event.inputs.custom_prompt }}
          AI_ENABLED:        ${{ vars.AI_ENABLED }}
        run: python scraper.py

      - name: Write config.js via Contents API (before git push to avoid race)
        env:
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
        run: |
          printf 'window.GH_DISPATCH_TOKEN="%s";\n' "$GH_DISPATCH_TOKEN" > config.js

          SHA=$(curl -s \
            -H "Authorization: Bearer ${GH_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/TinkerWithAll/Web/contents/config.js?ref=main" \
            | python3 -c "
import sys, json
try:
    print(json.load(sys.stdin).get('sha',''))
except:
    print('')
")

          CONTENT=$(base64 -w 0 config.js)

          BODY=$(python3 -c "
import json
d = {'message': 'chore: update config.js [skip ci]', 'content': '${CONTENT}'}
sha = '${SHA}'.strip()
if sha:
    d['sha'] = sha
print(json.dumps(d))
")

          RESULT=$(curl -s -X PUT \
            -H "Authorization: Bearer ${GH_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/TinkerWithAll/Web/contents/config.js" \
            -d "$BODY")

          echo "$RESULT" | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    sha = d.get('commit', {}).get('sha', '')
    if sha:
        print('config.js written OK:', sha[:12])
    else:
        print('WARNING config.js write failed:', json.dumps(d)[:200])
except Exception as e:
    print('Parse error:', e)
"

      - name: Commit and push data files
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Never stage config.js — written above via API
          git reset HEAD config.js 2>/dev/null || true
          git checkout -- config.js 2>/dev/null || true

          git add -A

          if ! git diff --staged --quiet; then
            git commit -m "chore: automated feed update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            # Pull with rebase to incorporate the config.js API commit made above
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit."
          fi
