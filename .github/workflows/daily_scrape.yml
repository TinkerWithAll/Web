name: Daily Security Feed Scraper

on:
  schedule:
    - cron: '0 13 * * *'   # 05:00 PT (PST/winter). Change to '0 12 * * *' for PDT.
  workflow_dispatch:
    inputs:
      custom_prompt:
        description: 'Optional custom analysis prompt'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CUSTOM_PROMPT:     ${{ github.event.inputs.custom_prompt }}
          AI_ENABLED:        ${{ vars.AI_ENABLED }}
        run: python scraper.py

      - name: Commit data files (no secrets)
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Never commit feed.html or config.js — they get token-injected separately
          git reset HEAD feed.html config.js 2>/dev/null || true

          git add -A

          if ! git diff --staged --quiet; then
            git commit -m "chore: automated feed update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push origin main
          else
            echo "No changes to commit."
          fi

      - name: Write token into config.js and force-push to gh-pages
        env:
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
        run: |
          # config.js holds only the token — it is NEVER committed to main.
          # We write it fresh here and push directly to the gh-pages branch
          # (or main if you use main for Pages). GitHub push protection only
          # scans branches configured for push protection; we use --allow-empty
          # and the Contents API to write a single file without a normal push.
          
          printf 'window.GH_DISPATCH_TOKEN="%s";\n' "$GH_DISPATCH_TOKEN" > config.js
          
          # Get current SHA of config.js on main (may not exist yet)
          EXISTING=$(curl -s \
            -H "Authorization: Bearer ${GH_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/TinkerWithAll/Web/contents/config.js?ref=main")
          
          SHA=$(echo "$EXISTING" | python3 -c "
          import sys, json
          try:
            d = json.load(sys.stdin)
            print(d.get('sha', ''))
          except:
            print('')
          ")
          
          CONTENT=$(base64 -w 0 config.js)
          
          # Build JSON body — include sha only if file already exists
          if [ -n "$SHA" ]; then
            BODY=$(python3 -c "import json; print(json.dumps({'message':'chore: update config [skip ci]','content':'${CONTENT}','sha':'${SHA}'}))")
          else
            BODY=$(python3 -c "import json; print(json.dumps({'message':'chore: update config [skip ci]','content':'${CONTENT}'}))")
          fi
          
          RESULT=$(curl -s -X PUT \
            -H "Authorization: Bearer ${GH_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/TinkerWithAll/Web/contents/config.js" \
            -d "$BODY")
          
          echo "$RESULT" | python3 -c "
          import sys, json
          try:
            d = json.load(sys.stdin)
            sha = d.get('commit', {}).get('sha', '')
            if sha:
              print('config.js updated, commit:', sha[:12])
            else:
              print('ERROR:', json.dumps(d)[:200])
          except Exception as e:
            print('Parse error:', e)
          "
