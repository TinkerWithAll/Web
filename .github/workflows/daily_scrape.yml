name: Daily Security Feed Scraper

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      custom_prompt:
        description: 'Optional custom analysis prompt'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CUSTOM_PROMPT:     ${{ github.event.inputs.custom_prompt }}
          AI_ENABLED:        ${{ vars.AI_ENABLED }}
        run: python scraper.py

      - name: Inject dispatch token into config.js
        env:
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
        run: |
          printf 'window.GH_DISPATCH_TOKEN = "%s";\n' "$GH_DISPATCH_TOKEN" > config.js

      - name: Commit and push results
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Stage ALL changes so nothing is left unstaged before the pull
          git reset
          git add -A

          if ! git diff --staged --quiet; then
            git pull --rebase origin main
            git commit -m "chore: automated feed update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push origin main
          else
            echo "No changes to commit."
          fi
