<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zachary Baillod | Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .monogram {
      font-size: 3rem;
      font-weight: 700;
      color: #58a6ff;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 0.75rem;
    }

    p {
      color: #8b949e;
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 480px;
      margin-bottom: 2.5rem;
    }

    .feed-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(88, 166, 255, 0.1);
      color: #58a6ff;
      border: 1px solid rgba(88, 166, 255, 0.3);
      padding: 0.65rem 1.4rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }

    .feed-btn:hover {
      background: rgba(88, 166, 255, 0.18);
      border-color: rgba(88, 166, 255, 0.55);
    }

    footer {
      position: absolute;
      bottom: 1.5rem;
      color: #484f58;
      font-size: 0.78rem;
    }

</head>
